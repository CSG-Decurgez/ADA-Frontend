<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Avanzado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bienvenidas al Mundo de los Selectores</h1>
        <nav>
            <ul>
                <li><a href="#section1">Inicio</a></li>
                <li><a href="#section2">Acerca</a></li>
                <li><a href="#section3">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="section1">
            <h2>Inicio</h2>
            <p>Este es un ejemplo de cómo usar selectores avanzados.</p>
            <button>Haz clic aquí</button>
        </section>
        <section id="section2">
            <h2>Acerca</h2>
            <p>Explora los selectores y pseudo-clases en CSS.</p>
            <ul>
                <li>Elemento 1</li>
                <li>Elemento 2</li>
                <li>Elemento 3</li>
            </ul>
        </section>
        <section id="section3">
            <h2>Contacto</h2>
            <p>Este es el último párrafo</p>
            <form>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Escribe tu correo">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
