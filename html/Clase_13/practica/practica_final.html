<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Demo • Tarjeta de producto (posicionamiento)</title>

  <!-- Tipografías Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Russo+One&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/base.css">
  <link rel="stylesheet" href="practica_final.css">
</head>
<body>

  <main class="contenedor">
    <!-- Card principal: contenedor visual de la tarjeta -->
    <article class="card product-card" aria-label="Tarjeta de producto">
      <!-- Imagen del producto (puede ser <img> o fondo) -->
      <figure class="product-media">
  <img src="remera.jpg" alt="Remera Negra algodón" class="product-image">
  <div class="badge badge-shipping">Envío gratis</div>
  <div class="badge badge-discount">-20%</div>
  <button class="fav-btn" aria-label="Agregar a favoritos" title="Favorito">♥</button>
</figure>

      <!-- Pie de la tarjeta: nombre, descripción y precio -->
      <footer class="product-info">
        <h3 class="product-name">Weiss Profile</h3>
        <p class="product-desc">Remera mujer profile negra</p>
        <p class="product-price" aria-label="Precio">$32.000</p>
      </footer>
    </article>
    <p>
      <a href="../../Clase_13/clase13_guia_practica.html">Volver a Guía Práctica</a>
      <a href="../../../index.html">Volver al HOME</a>
    </p>
  </main>


</body>
</html>
